# Threat model / run config (roadmap Weeks 4-5).
# Copy to threat_model.yaml and edit. Commit configs alongside results.

models:
  - llama-3.3-70b-versatile   # via Groq (OpenAI-compatible)

suites:
  - workspace

adapters:
  - raw_loop
  - langgraph

attacks:
  # single-shot templated attacks (deterministic, seed-reproducible)
  - direct
  - ignore_previous
  - system_message
  - injecagent
  - important_instructions
  - fixed_injection
  # adaptive attacker — runs a campaign per seed, not a single episode.
  # LLM-driven, so NOT seed-reproducible. Uses ATTACKER_MODEL (or GROQ_MODEL).
  - iterative

defenses:
  - null           # baseline, no mitigation
  - tool_filter     # restricts the model's tool menu to allowed_tools below

# tool_filter's allowlist. Excluding send_email means the model is never even
# offered the leak-capable tool, regardless of what the attack talks it into.
allowed_tools:
  - read_inbox

seeds: [0, 1, 2]

# hard cost controls (add now, roadmap Weeks 4-5)
limits:
  max_tokens_per_run: null
  smoke: false          # --smoke runs a tiny subset cheaply
  campaign_budget: 8    # max attempts per adaptive (iterative) campaign
